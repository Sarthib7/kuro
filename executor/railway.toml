# Railway service config for kuro-executor (Rust hot path).
#
# Build: explicit Dockerfile (Railpack/Nixpacks OOMed on the full solana-sdk
# crate graph). Dockerfile caps cargo parallelism at 2 jobs to fit in Railway's
# default builder memory.
#
# Required env vars in the Railway service dashboard:
#   SOLANA_RPC_URL=https://mainnet.helius-rpc.com/?api-key=...
#   PORT=8080
#   KURO_BIND=0.0.0.0:8080
#   KURO_EXECUTOR_API_KEY=<strong random secret>
#   KURO_DATA_DIR=/data
#   KURO_MAX_TRADE_SOL=0.02
#   KURO_DAILY_CAP_SOL=0.1
#
# Required volume:
#   Mount at /data, size >= 1 GB. Holds keypair.json + state.json. Losing this
#   volume = losing the wallet.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "kuro-executor"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
