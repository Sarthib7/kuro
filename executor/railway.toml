# Railway service config for kuro-executor (Rust hot path).
#
# Build: nixpacks auto-detects Cargo.toml in this directory.
# Deploy: built binary runs as the only process. Health check at /healthz so
# Railway can ping liveness without hitting Solana RPC.
#
# Required env vars to set in the Railway service dashboard:
#   SOLANA_RPC_URL=https://mainnet.helius-rpc.com/?api-key=...
#   KURO_DATA_DIR=/data
#   KURO_BIND=0.0.0.0:7777
#   KURO_MAX_TRADE_SOL=0.02
#   KURO_DAILY_CAP_SOL=0.1
#   KURO_DRAWDOWN_KILL_PCT=20
#
# Required volume:
#   - Mount at /data, size >= 1 GB. Holds keypair.json (the hot wallet) and
#     state.json (daily risk caps). DO NOT lose this volume — losing keypair.json
#     means losing the wallet.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "./target/release/kuro-executor"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
